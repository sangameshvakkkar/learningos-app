name: LearningOS CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main] # also run after merge so main is always green

jobs:

  # ── Job 1: Frontend Code Quality ─────────────────────────────────────────
  # Validates frontend before building. Lint runs FIRST (5s) so if code has
  # style/type errors we fail immediately without wasting 2min on the build.
  frontend-validation:
    name: Frontend Validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm                    # cache node_modules across runs
          cache-dependency-path: frontend/package-lock.json

      - name: Install Dependencies
        run: npm ci                     # deterministic — uses lock file exactly
        working-directory: frontend

      - name: Lint
        run: npm run lint               # runs first — cheapest check, fail fast
        working-directory: frontend

      - name: Test
        run: npm run test -- --run      # --run prevents vitest from running in watch mode
        working-directory: frontend

      - name: Build
        run: npm run build              # runs only if lint and tests pass
        working-directory: frontend

  # ── Job 2: Backend Code Quality ──────────────────────────────────────────
  # 1. All dependencies install correctly
  # 2. Every .py file has valid syntax
  # 3. Code conforms to ruff linting
  # 4. Pytest test suite passes
  backend-validation:
    name: Backend Validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip                    # cache pip packages across runs
          cache-dependency-path: backend/requirements.txt

      - name: Install Dependencies
        run: pip install --no-cache-dir -r requirements.txt
        working-directory: backend

      - name: Syntax Check
        run: python -m compileall app   # parses every .py — catches syntax errors
        working-directory: backend

      - name: Lint with Ruff
        run: python -m ruff check app tests
        working-directory: backend

      - name: Run Tests
        run: python -m pytest
        working-directory: backend

  # ── Job 3: Docker Image Builds + Security Scan ──────────────────────────
  # Only runs if BOTH validation jobs pass.
  #
  # LSS-2: Multi-stage Dockerfiles (already implemented in Dockerfiles)
  # LSS-3: Layer caching via type=gha (below)
  # LSS-4: Dual tagging — sha (immutable) + latest (mutable pointer to newest)
  # LSS-5: Trivy scans each image after build. CRITICAL = fail. HIGH = warn.
  #
  # Why load: true?
  #   build-push-action by default uses BuildKit's internal cache and doesn't
  #   expose the image to the Docker daemon. Trivy needs the image loaded into
  #   the local Docker daemon to scan it. load: true does exactly that.
  #   trade-off: slightly slower (extra layer export step), but no registry needed.
  docker-build:
    name: Docker Build & Security Scan
    runs-on: ubuntu-latest
    needs: [frontend-validation, backend-validation] # blocks until both pass

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3  # enables advanced builder with caching

      # ── Frontend ──────────────────────────────────────────────────────────
      - name: Build Frontend Image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: false                         # no push yet — ECR push comes in Sprint 2
          load: true                          # load into local Docker daemon so Trivy can scan it
          tags: |                             # LSS-4: dual tag strategy
            learningos-frontend:${{ github.sha }}
            learningos-frontend:latest
          cache-from: type=gha               # LSS-3: reuse cached layers from previous runs
          cache-to: type=gha,mode=max        # store new layers back to cache

      # LSS-5: Trivy scans the frontend image for known CVEs.
      # --exit-code 1 on CRITICAL means the job (and PR) fails if any CRITICAL vuln found.
      # HIGH vulns produce table output but do NOT fail the build (--exit-code 0).
      - name: Scan Frontend Image (Trivy)
        uses: aquasecurity/trivy-action@v0.28.0
        with:
          image-ref: learningos-frontend:${{ github.sha }}
          format: table                       # human-readable table in CI logs
          exit-code: '1'                      # fail job on CRITICAL vulnerabilities
          ignore-unfixed: true                # skip vulns with no fix available (noise reduction)
          severity: CRITICAL,HIGH             # only report CRITICAL and HIGH

      # ── Backend ───────────────────────────────────────────────────────────
      - name: Build Backend Image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: false
          load: true                          # load into Docker daemon for Trivy
          tags: |
            learningos-backend:${{ github.sha }}
            learningos-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan Backend Image (Trivy)
        uses: aquasecurity/trivy-action@v0.28.0
        with:
          image-ref: learningos-backend:${{ github.sha }}
          format: table
          exit-code: '1'
          ignore-unfixed: true
          severity: CRITICAL,HIGH
