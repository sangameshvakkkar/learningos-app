name: LearningOS CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main] # also run after merge so main is always green

jobs:

  # ── Job 1: Frontend Code Quality ─────────────────────────────────────────
  # Validates frontend before building. Lint runs FIRST (5s) so if code has
  # style/type errors we fail immediately without wasting 2min on the build.
  frontend-validation:
    name: Frontend Validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm                    # cache node_modules across runs
          cache-dependency-path: frontend/package-lock.json

      - name: Install Dependencies
        run: npm ci                     # deterministic — uses lock file exactly
        working-directory: frontend

      - name: Lint
        run: npm run lint               # runs first — cheapest check, fail fast
        working-directory: frontend

      - name: Test
        run: npm run test -- --run      # --run prevents vitest from running in watch mode
        working-directory: frontend

      - name: Build
        run: npm run build              # runs only if lint and tests pass
        working-directory: frontend

  # ── Job 2: Backend Code Quality ──────────────────────────────────────────
  # 1. All dependencies install correctly
  # 2. Every .py file has valid syntax
  # 3. Code conforms to ruff linting
  # 4. Pytest test suite passes
  backend-validation:
    name: Backend Validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip                    # cache pip packages across runs
          cache-dependency-path: backend/requirements.txt

      - name: Install Dependencies
        run: pip install --no-cache-dir -r requirements.txt
        working-directory: backend

      - name: Syntax Check
        run: python -m compileall app   # parses every .py — catches syntax errors
        working-directory: backend

      - name: Lint with Ruff
        run: python -m ruff check app tests
        working-directory: backend

      - name: Run Tests
        run: python -m pytest
        working-directory: backend

  # ── Job 3: Docker Image Builds ───────────────────────────────────────────
  # Only runs if BOTH validation jobs pass.
  # Purpose: prove Docker images build successfully before any PR merges.
  # We don't push images yet (that's Sprint 8 with ECR) — just validate they build.
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [frontend-validation, backend-validation] # blocks until both pass

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3  # enables advanced builder with caching

      - name: Build Frontend Image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: false                   # build only, no push yet (ECR comes Sprint 8)
          tags: learningos-frontend:${{ github.sha }}
          cache-from: type=gha          # use GitHub Actions cache for Docker layers
          cache-to: type=gha,mode=max   # store layers back to cache after build

      - name: Build Backend Image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: false
          tags: learningos-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max